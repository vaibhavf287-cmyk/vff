<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Browser</title>
<style>
body{margin:0;overflow:hidden;background:black}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

const blocks = []

const geometry = new THREE.BoxGeometry()

function createBlock(x,y,z,color=0x55ff55){

const material = new THREE.MeshStandardMaterial({color:color})

const block = new THREE.Mesh(geometry,material)

block.position.set(x,y,z)

scene.add(block)

blocks.push(block)

}

for(let x=-10;x<10;x++){
for(let z=-10;z<10;z++){

createBlock(x,0,z,0x228822)

}
}

const player = new THREE.Object3D()
player.position.y = 2
scene.add(player)

camera.position.set(0,0,0)
player.add(camera)

let velocity = {x:0,z:0}

const speed = 0.1

const keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

document.body.onclick=()=>{
document.body.requestPointerLock()
}

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement){

player.rotation.y -= e.movementX*0.002
camera.rotation.x -= e.movementY*0.002

}

})

const raycaster = new THREE.Raycaster()

document.addEventListener("mousedown",e=>{

raycaster.setFromCamera(new THREE.Vector2(0,0),camera)

const intersects = raycaster.intersectObjects(blocks)

if(intersects.length>0){

const block = intersects[0].object

if(e.button===0){

scene.remove(block)

}

if(e.button===2){

const pos = intersects[0].point
const normal = intersects[0].face.normal

createBlock(
Math.round(pos.x+normal.x),
Math.round(pos.y+normal.y),
Math.round(pos.z+normal.z),
0xaaaaaa
)

}

}

})

function animate(){

requestAnimationFrame(animate)

if(keys["w"]) player.translateZ(-speed)
if(keys["s"]) player.translateZ(speed)
if(keys["a"]) player.translateX(-speed)
if(keys["d"]) player.translateX(speed)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
