<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft WN: Nature & Face Sync</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: 'Arial', sans-serif; user-select: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #setup-screen { position: absolute; width: 100%; height: 100%; background: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; pointer-events: auto; }
        .setup-box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; border: 2px solid #3498db; text-align: center; width: 260px; }
        
        #mp-toggle { position: absolute; top: 10px; left: 10px; width: 50px; height: 50px; background: #34495e; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; pointer-events: auto; border: 2px solid white; z-index: 20; }
        #mp-overlay { position: absolute; top: 70px; left: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; color: #fff; pointer-events: auto; border: 1px solid #3498db; display: none; width: 200px; z-index: 20; }
        
        input { width: 100%; background: #111; color: #3498db; border: 1px solid #3498db; padding: 10px; margin: 10px 0; border-radius: 5px; box-sizing: border-box; }
        .menu-btn { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; pointer-events: auto; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; }
        .slot { width: 40px; height: 40px; border: 2px solid #555; background: #8b8b8b; display: flex; align-items: center; justify-content: center; font-size: 8px; color: white; }
        .slot.active { border-color: #3498db; background: #fff; color: #000; }

        #joy-base { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }

        .actions { position: absolute; bottom: 30px; right: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; color: white; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h3>MINECRAFT WN</h3>
            <input type="text" id="username" placeholder="Name (e.g. vff)">
            <select id="skin-select" style="width:100%; padding:10px; margin-bottom:10px; background:#111; color:white; border:1px solid #3498db;">
                <option value="male">Male (Steve)</option>
                <option value="female">Female (Alex)</option>
            </select>
            <button class="menu-btn" onclick="startGame()">START</button>
        </div>
    </div>

    <div id="ui" style="display:none">
        <div id="mp-toggle" onclick="toggleMPMenu()">WN</div>
        <div id="mp-overlay">
            <small>WN:</small> <b id="my-wn">...</b>
            <input type="number" id="target-wn" placeholder="Friend WN">
            <button class="menu-btn" onclick="joinWorld()">JOIN</button>
        </div>
        <div id="hotbar">
            <div class="slot active" onclick="setMat('grass', 0)">GRASS</div>
            <div class="slot" onclick="setMat('wood', 1)">WOOD</div>
            <div class="slot" onclick="setMat('leaf', 2)">LEAF</div>
            <div class="slot" onclick="setMat('stone', 3)">STONE</div>
            <div class="slot" onclick="setMat('water', 4)">WATER</div>
        </div>
        <div id="joy-base"><div id="joy-stick"></div></div>
        <div class="actions">
            <button class="btn" id="jump">JUMP</button>
            <button class="btn" onclick="interact('hit')">HIT</button>
            <button class="btn" onclick="interact('build')">BUILD</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>

    <script>
        let myName = "Player", mySkin = "male";
        function startGame() {
            myName = document.getElementById('username').value || "Player";
            mySkin = document.getElementById('skin-select').value;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            init();
        }

        let scene, camera, renderer, peer, conns = [], remotePlayers = {};
        let blocks = [], chunks = {}, currentMat = 'grass';
        let lon = 0, lat = 0, moveX = 0, moveZ = 0, joyId = null, rotId = null, lastX, lastY;
        const myWN = Math.floor(100000 + Math.random() * 900000).toString();

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({antialias: false});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5); sun.position.set(10, 50, 10); scene.add(sun);

            peer = new Peer("WN-" + myWN);
            peer.on('open', id => document.getElementById('my-wn').innerText = myWN);
            peer.on('connection', c => setupConn(c));

            camera.position.set(0, 10, 0);
            loop();
        }

        const materials = {
            grass: new THREE.MeshLambertMaterial({color: 0x567d46}),
            stone: new THREE.MeshLambertMaterial({color: 0x808080}),
            wood: new THREE.MeshLambertMaterial({color: 0x5d4037}),
            leaf: new THREE.MeshLambertMaterial({color: 0x2e7d32, transparent: true, opacity: 0.9}),
            water: new THREE.MeshLambertMaterial({color: 0x3498db, transparent: true, opacity: 0.6})
        };

        function createCharacter(data) {
            const group = new THREE.Group();
            const skinTone = 0xffdbac;
            const clothes = data.skin === 'male' ? 0x2a5298 : 0x2ecc71;

            // Head with Face Details
            const headGroup = new THREE.Group();
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshLambertMaterial({color: skinTone}));
            
            // Eyes
            const eyeGeo = new THREE.BoxGeometry(0.05, 0.05, 0.05);
            const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
            const e1 = new THREE.Mesh(eyeGeo, eyeMat); e1.position.set(0.1, 0.05, 0.21);
            const e2 = new THREE.Mesh(eyeGeo, eyeMat); e2.position.set(-0.1, 0.05, 0.21);
            
            // Lips
            const lip = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.02, 0.01), new THREE.MeshBasicMaterial({color: 0x800000}));
            lip.position.set(0, -0.1, 0.21);
            
            headGroup.add(head, e1, e2, lip);
            headGroup.position.y = 1.4;

            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), new THREE.MeshLambertMaterial({color: clothes}));
            body.position.y = 0.85;

            // Arms & Legs
            const armR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.7, 0.15), new THREE.MeshLambertMaterial({color: skinTone}));
            armR.position.set(0.35, 0.85, 0);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 0.2), new THREE.MeshLambertMaterial({color: 0x333333}));
            legR.position.set(0.15, 0.25, 0);

            group.add(headGroup, body, armR, legR);
            scene.add(group);
            return { group, headGroup };
        }

        function genChunk(cx, cz) {
            let k = `${cx},${cz}`; if(chunks[k]) return; chunks[k] = true;
            for(let x=0; x<8; x++) for(let z=0; z<8; z++) {
                let wx = cx*8+x, wz = cz*8+z;
                // Basic Ground
                addBlock(wx, -1, wz, 'grass', false);
                // Random Trees (Gardens)
                if(Math.random() > 0.98) {
                    for(let h=0; h<3; h++) addBlock(wx, h, wz, 'wood', false);
                    addBlock(wx, 3, wz, 'leaf', false);
                }
                // Random Water Puddles
                if(Math.random() > 0.99) addBlock(wx, -1, wz, 'water', false);
            }
        }

        function sync() {
            const data = {
                type: 'move', id: peer.id, name: myName, skin: mySkin,
                x: camera.position.x, y: camera.position.y - 1.6, z: camera.position.z,
                ry: lon * (Math.PI/180), rx: lat * (Math.PI/180)
            };
            conns.forEach(c => { if(c.open) c.send(data); });
        }

        function setupConn(conn) {
            conn.on('data', d => {
                if(d.type === 'move') {
                    if(!remotePlayers[d.id]) remotePlayers[d.id] = createCharacter(d);
                    const p = remotePlayers[d.id];
                    p.group.position.set(d.x, d.y, d.z);
                    p.headGroup.rotation.y = d.ry;
                    p.headGroup.rotation.x = -d.rx; // Invert for natural look
                }
            });
            conns.push(conn);
        }

        function addBlock(x,y,z, mat, s=true) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), materials[mat]);
            b.position.set(x,y,z); scene.add(b); blocks.push(b);
        }

        // Joystick & Input
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) joyId = t.identifier;
                else if(!t.target.closest('button')) { rotId = t.identifier; lastX = t.clientX; lastY = t.clientY; }
            }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyId) {
                    let r = document.getElementById('joy-base').getBoundingClientRect();
                    let dx = t.clientX - (r.left+50), dy = t.clientY - (r.top+50);
                    moveX = dx/50; moveZ = dy/50;
                    document.getElementById('joy-stick').style.left = `calc(50% + ${Math.min(Math.max(dx,-50),50)}px)`;
                    document.getElementById('joy-stick').style.top = `calc(50% + ${Math.min(Math.max(dy,-50),50)}px)`;
                }
                if(t.identifier === rotId) {
                    lon += (t.clientX - lastX)*0.3; lat -= (t.clientY - lastY)*0.3;
                    lat = Math.max(-85, Math.min(85, lat)); lastX = t.clientX; lastY = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyId) { joyId=null; moveX=0; moveZ=0; document.getElementById('joy-stick').style.left='50%'; document.getElementById('joy-stick').style.top='50%'; }
                if(t.identifier === rotId) rotId=null;
            }
        });

        let vy = 0;
        function loop() {
            requestAnimationFrame(loop);
            camera.lookAt(new THREE.Vector3().setFromSphericalCoords(1,(90-lat)*Math.PI/180, lon*Math.PI/180).add(camera.position));
            if(joyId !== null) { camera.translateZ(moveZ*0.15); camera.translateX(moveX*0.15); }
            
            vy -= 0.01; camera.position.y += vy;
            if(camera.position.y < 1.8) { camera.position.y = 1.8; vy = 0; }
            
            let cx = Math.floor(camera.position.x/8), cz = Math.floor(camera.position.z/8);
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) genChunk(cx+i, cz+j);
            
            sync();
            renderer.render(scene, camera);
        }

        function setMat(m, i) { currentMat = m; document.querySelectorAll('.slot').forEach((s,idx)=>s.classList.toggle('active', i===idx)); }
        function toggleMPMenu() { const m = document.getElementById('mp-overlay'); m.style.display = m.style.display==='block'?'none':'block'; }
        function joinWorld() { setupConn(peer.connect("WN-" + document.getElementById('target-wn').value)); }
        document.getElementById('jump').onclick = () => { if(camera.position.y <= 1.9) vy = 0.2; };
    </script>
</body>
</html>
